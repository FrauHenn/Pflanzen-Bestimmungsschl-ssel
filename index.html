<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pflanzen bestimmen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl p-4 md:p-6 max-w-xl w-full text-center">
  <h1 class="text-xl md:text-2xl font-bold mb-4">🌼 Pflanzen bestimmen</h1>
  <p id="frage" class="text-lg mb-4"></p>

  <img id="bild" src="" class="mx-auto mb-4 rounded-xl max-h-48 hidden" />

  <div id="buttons" class="grid gap-3"></div>
</div>

<script>
const steps = {
  start: {
    frage: "Welche Blütenfarbe hat die Pflanze?",
    optionen: [
      {text: "Weiß", next: "weiss"},
      {text: "Gelb", next: "gelb"},
      {text: "Lila / Blau", next: "lila"}
    ]
  },

  weiss: {
    frage: "Wie viele Blütenblätter hat die Blüte?",
    optionen: [
      {text: "5", next: "dolde"},
      {text: "< 5", next: "form_weiss"}
    ]
  },

  dolde: {
    frage: "Sind die Blüten wie ein Schirm (Dolde)?",
    optionen: [
      {text: "Ja", result: "Wilde Möhre", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Daucus_carota.jpg/320px-Daucus_carota.jpg"},
      {text: "Nein", result: "Walderdbeere", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Fragaria_vesca.jpg/320px-Fragaria_vesca.jpg"}
    ]
  },

  form_weiss: {
    frage: "Form der Blütenblätter?",
    optionen: [
      {text: "Rund", result: "Knoblauchsrauke", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/89/Alliaria_petiolata.jpg/320px-Alliaria_petiolata.jpg"},
      {text: "Spitz", result: "Wiesenkerbel", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Anthriscus_sylvestris.jpg/320px-Anthriscus_sylvestris.jpg"}
    ]
  },

  gelb: {
    frage: "Wie viele Blütenblätter?",
    optionen: [
      {text: "> 5", result: "Löwenzahn", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Taraxacum.jpg/320px-Taraxacum.jpg"},
      {text: "5", result: "Johanniskraut", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Hypericum_perforatum.jpg/320px-Hypericum_perforatum.jpg"}
    ]
  },

  lila: {
    frage: "Ist es eine Lippenblüte?",
    optionen: [
      {text: "Ja", next: "lippe"},
      {text: "Nein", next: "glocke"}
    ]
  },

  lippe: {
    frage: "Welche Farbe genau?",
    optionen: [
      {text: "Gefleckt", result: "Gefleckte Taubnessel", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Lamium_maculatum.jpg/320px-Lamium_maculatum.jpg"},
      {text: "Lila", result: "Wiesensalbei", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Salvia_pratensis.jpg/320px-Salvia_pratensis.jpg"},
      {text: "Weiß", result: "Thymian", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Thymus.jpg/320px-Thymus.jpg"}
    ]
  },

  glocke: {
    frage: "Ist die Blüte glockenförmig?",
    optionen: [
      {text: "Ja", result: "Glockenblume", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Campanula.jpg/320px-Campanula.jpg"},
      {text: "Nein", next: "weitere"}
    ]
  },

  weitere: {
    frage: "Welche passt besser?",
    optionen: [
      {text: "Rund", result: "Acker-Witwenblume", img: "https://upload.wiki"},
      {text: "Spitz", result: "Wiesen-Flockenblume", img: "https://upload.wikimedia.org/wikipedia/commons/5/5a/Centaurea_jacea.jpg"}
    ]
  }
};

function render(stepKey) {
  const step = steps[stepKey];
  document.getElementById("frage").innerText = step.frage;
  const container = document.getElementById("buttons");
  const img = document.getElementById("bild");
  img.classList.add("hidden");
  container.innerHTML = "";

  step.optionen.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "bg-green-200 hover:bg-green-300 p-3 rounded-2xl text-lg";
    btn.innerText = opt.text;

    btn.onclick = () => {
      if (opt.result) {
        document.getElementById("frage").innerText = "👉 " + opt.result;
        if (opt.img) {
          img.src = opt.img;
          img.classList.remove("hidden");
        }
        container.innerHTML = '<button onclick="render(\'start\')" class="mt-4 bg-blue-200 p-3 rounded-xl">🔄 Neu starten</button>';
      } else {
        render(opt.next);
      }
    };

    container.appendChild(btn);
  });
}

render("start");
</script>

</body>
</html>
