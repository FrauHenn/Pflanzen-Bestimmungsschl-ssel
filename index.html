<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pflanzen bestimmen – Lernversion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl p-4 md:p-6 max-w-xl w-full text-center">
  <h1 class="text-xl md:text-2xl font-bold mb-2">🌼 Pflanzen bestimmen</h1>
  <p class="text-sm mb-4">Mit Tipps & Vergleichsbildern</p>

  <p id="frage" class="text-lg mb-2"></p>
  <p id="hilfe" class="text-sm text-gray-600 mb-2 hidden"></p>

  <div class="flex gap-2 justify-center mb-3">
    <button onclick="toggleTipp()" class="bg-yellow-200 px-3 py-1 rounded-xl">💡 Tipp anzeigen</button>
  </div>

  <div id="bilder" class="flex gap-2 justify-center mb-4"></div>

  <div id="buttons" class="grid gap-3"></div>
</div>

<script>
let tippSichtbar = false;

const bilder = {
  dolde: [
    "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Daucus_carota.jpg/320px-Daucus_carota.jpg",
    "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/Anthriscus_sylvestris.jpg/320px-Anthriscus_sylvestris.jpg"
  ],
  lippe: [
    "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Lamium_maculatum.jpg/320px-Lamium_maculatum.jpg",
    "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Salvia_pratensis.jpg/320px-Salvia_pratensis.jpg"
  ],
  glocke: [
    "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Campanula.jpg/320px-Campanula.jpg"
  ],
  korb: [
    "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Taraxacum.jpg/320px-Taraxacum.jpg",
    "https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Bellis_perennis.jpg/320px-Bellis_perennis.jpg"
  ]
};

const steps = {
  start:{
    frage:"Welche Farbe hat die Blüte?",
    hilfe:"Schau dir die Blüte genau an.",
    optionen:[
      {text:"weiß",next:"weiss"},
      {text:"gelb",next:"gelb"},
      {text:"blau / violett",next:"blau"}
    ]
  },

  weiss:{
    frage:"Sind viele kleine Blüten wie ein Regenschirm angeordnet?",
    hilfe:"Dolde = viele kleine Blüten stehen wie ein Regenschirm zusammen.",
    bild:"dolde",
    optionen:[
      {text:"ja",result:"Wilde Möhre"},
      {text:"nein",result:"Walderdbeere"}
    ]
  },

  gelb:{
    frage:"Besteht die Blüte aus vielen kleinen Einzelblüten?",
    hilfe:"Blütenkorb = viele kleine Blüten bilden zusammen eine große Blüte.",
    bild:"korb",
    optionen:[
      {text:"ja",result:"Löwenzahn"},
      {text:"nein",next:"gelb2"}
    ]
  },

  gelb2:{
    frage:"Hat die Blüte genau 5 Blütenblätter?",
    hilfe:"Zähle die Blätter.",
    optionen:[
      {text:"ja",result:"Johanniskraut"},
      {text:"nein",result:"Hahnenfuß"}
    ]
  },

  blau:{
    frage:"Sieht die Blüte wie ein offener Mund aus?",
    hilfe:"Lippenblüte = sieht aus wie ein Mund mit Ober- und Unterlippe.",
    bild:"lippe",
    optionen:[
      {text:"ja",result:"Taubnessel"},
      {text:"nein",next:"blau2"}
    ]
  },

  blau2:{
    frage:"Sieht die Blüte wie eine Glocke aus?",
    hilfe:"Achte auf die Form der Blüte.",
    bild:"glocke",
    optionen:[
      {text:"ja",result:"Glockenblume"},
      {text:"nein",result:"Flockenblume"}
    ]
  }
};

function toggleTipp(){
  tippSichtbar = !tippSichtbar;
  document.getElementById("hilfe").classList.toggle("hidden", !tippSichtbar);
}

function render(stepKey){
  const step=steps[stepKey];
  document.getElementById("frage").innerText=step.frage;
  document.getElementById("hilfe").innerText=step.hilfe || "";
  document.getElementById("hilfe").classList.add("hidden");
  tippSichtbar = false;

  const bilderDiv = document.getElementById("bilder");
  bilderDiv.innerHTML = "";

  if(step.bild && bilder[step.bild]){
    bilder[step.bild].forEach(src=>{
      const img=document.createElement("img");
      img.src=src;
      img.className="h-24 rounded-lg";
      bilderDiv.appendChild(img);
    });
  }

  const c=document.getElementById("buttons");
  c.innerHTML="";

  step.optionen.forEach(opt=>{
    const b=document.createElement("button");
    b.className="bg-green-200 hover:bg-green-300 p-3 rounded-2xl text-lg";
    b.innerText=opt.text;

    b.onclick=()=>{
      if(opt.result){
        document.getElementById("frage").innerText="👉 " + opt.result;
        document.getElementById("hilfe").innerText="";
        bilderDiv.innerHTML="";
        c.innerHTML='<button onclick="render(\'start\')" class="mt-4 bg-blue-200 p-3 rounded-xl">🔄 Neu starten</button>';
      } else render(opt.next);
    };

    c.appendChild(b);
  });
}

render("start");
</script>

</body>
</html>
