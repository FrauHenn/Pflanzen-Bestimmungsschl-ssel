<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pflanzen bestimmen – Profi-Version</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-green-50 flex items-center justify-center min-h-screen">

<div class="bg-white shadow-xl rounded-2xl p-4 md:p-6 max-w-xl w-full text-center">
  <h1 class="text-xl md:text-2xl font-bold mb-2">🌼 Pflanzen bestimmen</h1>
  <p class="text-sm mb-4">Finde die richtige Pflanze – Schritt für Schritt!</p>

  <p id="frage" class="text-lg mb-4"></p>
  <canvas id="skizze" width="300" height="200" class="mx-auto mb-4 border rounded-xl"></canvas>

  <div id="buttons" class="grid gap-3"></div>
  <p id="feedback" class="mt-4 font-semibold"></p>
</div>

<script>
let score = 0;
let total = 0;

function draw(type) {
  const canvas = document.getElementById("skizze");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "black";
  ctx.lineWidth = 2;

  if(type === "dolde"){
    for(let i=0;i<8;i++){
      let angle = (i/8)*Math.PI*2;
      ctx.beginPath();
      ctx.moveTo(150,100);
      ctx.lineTo(150+60*Math.cos(angle),100+60*Math.sin(angle));
      ctx.stroke();
    }
    ctx.fillText("Dolde",120,180);
  }

  if(type === "5blaetter"){
    for(let i=0;i<5;i++){
      let angle = (i/5)*Math.PI*2;
      ctx.beginPath();
      ctx.arc(150+40*Math.cos(angle),100+40*Math.sin(angle),15,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.fillText("5 Blütenblätter",90,180);
  }

  if(type === "lippe"){
    ctx.beginPath();
    ctx.arc(150,100,40,0,Math.PI);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(150,120,40,Math.PI,2*Math.PI);
    ctx.stroke();
    ctx.fillText("Lippenblüte",100,180);
  }

  if(type === "glocke"){
    ctx.beginPath();
    ctx.moveTo(120,60);
    ctx.lineTo(180,60);
    ctx.lineTo(170,140);
    ctx.lineTo(130,140);
    ctx.closePath();
    ctx.stroke();
    ctx.fillText("Glocke",120,180);
  }
}

const steps = {
  start: {
    frage: "Welche Farbe hat die Blüte?",
    draw: null,
    optionen: [
      {text: "Weiß", next: "weiss"},
      {text: "Gelb", next: "gelb"},
      {text: "Lila / Blau", next: "lila"}
    ]
  },

  weiss: {
    frage: "Wie viele Blütenblätter?",
    draw: "5blaetter",
    optionen: [
      {text: "5", result: "Walderdbeere 🍓"},
      {text: "Viele kleine (Dolde)", next: "dolde"}
    ]
  },

  dolde: {
    frage: "Schirmförmig angeordnet?",
    draw: "dolde",
    optionen: [
      {text: "Ja", result: "Wilde Möhre 🥕"},
      {text: "Nein", result: "Wiesenkerbel 🌿"}
    ]
  },

  gelb: {
    frage: "Wie viele Blütenblätter?",
    draw: "5blaetter",
    optionen: [
      {text: "Sehr viele", result: "Löwenzahn 🌼"},
      {text: "5", result: "Johanniskraut 🌿"}
    ]
  },

  lila: {
    frage: "Welche Form hat die Blüte?",
    draw: null,
    optionen: [
      {text: "Lippenform", next: "lippe"},
      {text: "Glocke", next: "glocke"},
      {text: "Andere", result: "Flockenblume 🌸"}
    ]
  },

  lippe: {
    frage: "Wie sieht die Blüte aus?",
    draw: "lippe",
    optionen: [
      {text: "Gefleckt", result: "Taubnessel 🌸"},
      {text: "Einfarbig", result: "Wiesensalbei 🌿"}
    ]
  },

  glocke: {
    frage: "Glockenförmig?",
    draw: "glocke",
    optionen: [
      {text: "Ja", result: "Glockenblume 🔔"},
      {text: "Nein", result: "Witwenblume 🌸"}
    ]
  }
};

function render(stepKey) {
  const step = steps[stepKey];
  document.getElementById("frage").innerText = step.frage;
  document.getElementById("feedback").innerText = "";

  if(step.draw) draw(step.draw);
  else {
    const ctx = document.getElementById("skizze").getContext("2d");
    ctx.clearRect(0,0,300,200);
  }

  const container = document.getElementById("buttons");
  container.innerHTML = "";

  step.optionen.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "bg-green-200 hover:bg-green-300 p-3 rounded-2xl text-lg";
    btn.innerText = opt.text;

    btn.onclick = () => {
      if (opt.result) {
        total++;
        score++;
        document.getElementById("frage").innerText = "👉 " + opt.result;
        document.getElementById("feedback").innerText = `Punkte: ${score}/${total}`;
        container.innerHTML = '<button onclick="render(\'start\')" class="mt-4 bg-blue-200 p-3 rounded-xl">🔄 Neue Pflanze</button>';
      } else {
        render(opt.next);
      }
    };

    container.appendChild(btn);
  });
}

render("start");
</script>

</body>
</html>
